services:
  postgres:
    image: postgres:16-alpine
    container_name: movie_collections_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: movie_user
      POSTGRES_PASSWORD: movie_password
      POSTGRES_DB: movie_collections
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie_user -d movie_collections"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
